<!doctype html>
<html lang="en" data-theme="modern">
	<head>
		<meta charset="utf-8" />
		<script>
(function() {
  var SKELETON_THEMES = ['catppuccin','cerberus','concord','crimson','fennec','hamlindigo','legacy','mint','modern','mona','nosh','nouveau','pine','reign','rocket','rose','sahara','seafoam','terminus','vintage','vox','wintry','matrix','hotdog'];
  var CUSTOM_DARK_THEMES = ['matrix','hotdog'];

  var theme = 'modern';
  try { theme = localStorage.getItem('quickheadlines-theme') || 'modern'; } catch(e) {}

  if (SKELETON_THEMES.indexOf(theme) === -1) {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'modern' : 'modern';
  }

  document.documentElement.setAttribute('data-theme', theme);

  var isCustomDark = CUSTOM_DARK_THEMES.indexOf(theme) !== -1;
  document.documentElement.classList.toggle('dark', isCustomDark);
})();
		</script>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="QuickHeadlines" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=latin&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

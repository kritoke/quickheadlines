name: Deploy
permissions: {}

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'freebsd'
        type: choice
        options:
          - freebsd
          - linux
          - macos
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-amd64:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_REV=${{ github.ref_name }}

  build-and-push-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_REV=${{ github.ref_name }}

  build-binaries:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'linux' || inputs.platform == 'macos'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: arm64
          - os: macos-latest
            target: macos
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.target == 'linux'
        uses: docker/setup-qemu-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node.js version
        run: |
          echo "Node.js version: $(node --version)"
          echo "npm version: $(npm --version)"
          if [[ "$(node --version | cut -d. -f1 | tr -d 'v')" -lt 18 ]]; then
            echo "Error: Node.js 18+ required"
            exit 1
          fi
          echo "Node.js version is sufficient (18+)"

      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: |
            .shards
            lib
          key: ${{ runner.os }}-shards-${{ hashFiles('shard.lock') }}
          restore-keys: |
            ${{ runner.os }}-shards-

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build Svelte frontend
        run: cd frontend && pnpm install && pnpm run build

      - name: Build Linux Binaries (via Docker)
        if: matrix.target == 'linux'
        run: |
          docker run --rm --platform linux/${{ matrix.arch == 'x64' && 'amd64' || 'arm64' }} \
            --entrypoint /bin/sh \
            -v ${{ github.workspace }}:/app -w /app 84codes/crystal:1.18.2-ubuntu-22.04 \
            -c "apt-get update && apt-get install -y libxml2-dev libssl-dev libyaml-dev libsqlite3-dev libmagic-dev curl make && \
            shards install --production && \
            mkdir -p /app/bin && \
            touch src/web/assets.cr && \
            crystal build --release -Os -Dpreview_lto -Dversion=${{ github.ref_name }} src/quickheadlines.cr -o /app/bin/quickheadlines-linux-${{ matrix.arch }}"

      - name: Install system deps (macOS)
        if: matrix.target == 'macos'
        run: |
          brew install libyaml libxml2 openssl@3 libmagic
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix libmagic)/lib/pkgconfig" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix libmagic)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix libmagic)/include" >> $GITHUB_ENV
          echo "PATH=$(brew --prefix openssl@3)/bin:$PATH" >> $GITHUB_ENV

      - name: Install pnpm (macOS)
        if: matrix.target == 'macos'
        run: npm install -g pnpm@9

      - name: Build Svelte frontend (macOS)
        if: matrix.target == 'macos'
        run: cd frontend && pnpm install && pnpm run build

      - name: Install Crystal
        if: matrix.target == 'macos'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.18.2

      - name: Build Crystal binary (macOS)
        if: matrix.target == 'macos'
        run: |
          shards install --production
          mkdir -p bin
          touch src/web/assets.cr
          crystal build --release -Os -Dpreview_lto -Dversion=${{ github.ref_name }} src/quickheadlines.cr -o bin/quickheadlines-macos-${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}-${{ matrix.arch }}
          path: bin/quickheadlines-*

  build-freebsd:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'freebsd'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install pnpm
        run: npm install -g pnpm@9
      
      - name: Build Svelte frontend
        run: cd frontend && pnpm install && pnpm run build
      
      - name: Install shards (for caching)
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.18.2

      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: |
            .shards
            lib
          key: ${{ runner.os }}-shards-${{ hashFiles('shard.lock') }}
          restore-keys: |
            ${{ runner.os }}-shards-

      - name: Install shards (populate cache)
        run: shards install --production

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          prepare: pkg install -y crystal shards libxml2 libyaml openssl libevent libiconv bash gmake file sqlite3
          run: |
            mkdir -p bin
            touch src/web/assets.cr
            export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}:/usr/local/lib"
            export LDFLAGS="${LDFLAGS:-} -L/usr/local/lib"
            VERSION=$(grep '^version:' shard.yml | awk '{print $2}')
            crystal build --release -Os -Dpreview_lto -Dversion=v$VERSION src/quickheadlines.cr -o bin/quickheadlines-freebsd-x64
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-freebsd-x64
          path: bin/quickheadlines-*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-binaries, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: bin-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
